services:
  frontend:
    image: otsuge-frontend-dev
    build:
      context: ./frontend
      target: dev
    env_file:
      - ./frontend/frontend.env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      backend:
        condition: service_healthy

  backend:
    image: otsuge-backend-dev
    build:
      context: ./backend
      target: dev
    env_file:
      - ./backend/backend.env
      - ./database/database.env
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_next:/app/.next
      - ./database/data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  scheduler:
    image: otsuge-scheduler-dev
    build:
      context: ./scheduler
    env_file:
      - ./scheduler/scheduler.env
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
  frontend_next:
  backend_node_modules:
  backend_next:
